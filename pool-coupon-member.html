<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏊 내 수영장 쿠폰</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
  body { font-family:'Noto Sans KR',sans-serif; background:linear-gradient(180deg,#f0fdf4 0%,#f0f9ff 40%,#f8fafc 100%); min-height:100vh; }
  input::placeholder { color:#94a3b8; }

  .header {
    background:linear-gradient(135deg,#059669 0%,#10b981 50%,#34d399 100%);
    padding:28px 20px 20px; color:#fff; position:relative; overflow:hidden;
  }
  .header::before { content:''; position:absolute; top:-30px; right:-30px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,0.08); }
  .header::after { content:''; position:absolute; bottom:-20px; left:30px; width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,0.05); }
  .header-content { position:relative; z-index:1; }
  .header h1 { font-family:'Outfit',sans-serif; font-size:22px; font-weight:800; letter-spacing:-0.5px; display:inline; }

  .sync-badge {
    display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px;
    font-size:11px; font-weight:700; margin-left:8px; vertical-align:middle;
  }
  .sync-on { background:rgba(255,255,255,0.2); color:#fff; }
  .sync-off { background:rgba(239,68,68,0.3); color:#fca5a5; }
  .sync-dot { width:6px; height:6px; border-radius:50%; }
  .sync-dot.on { background:#fff; animation:pulse 2s infinite; }
  .sync-dot.off { background:#ef4444; }

  .content { padding:16px 16px 100px; max-width:560px; margin:0 auto; }

  .search-box {
    display:flex; gap:8px; margin-bottom:20px;
  }
  .search-input {
    flex:1; padding:14px 16px; border-radius:12px; border:2px solid #e2e8f0;
    font-family:'Noto Sans KR',sans-serif; font-size:16px; outline:none; transition:all 0.2s;
    background:#fff;
  }
  .search-input:focus { border-color:#10b981; box-shadow:0 0 0 3px rgba(16,185,129,0.15); }

  .member-list-item {
    padding:14px 16px; border-radius:12px; background:#fff; border:1.5px solid #e2e8f0;
    margin-bottom:8px; cursor:pointer; transition:all 0.15s;
  }
  .member-list-item:active { transform:scale(0.98); }
  .member-list-item:hover { border-color:#10b981; }

  .profile-card {
    padding:24px 20px; border-radius:18px; background:#fff; border:2px solid #a7f3d0;
    margin-bottom:16px; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.05);
  }

  .big-ring {
    width:100px; height:100px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; flex-direction:column; margin:0 auto 12px;
  }
  .big-ring-num { font-family:'Outfit',sans-serif; font-size:36px; font-weight:800; line-height:1; }
  .big-ring-label { font-size:12px; font-weight:600; margin-top:2px; }

  .stats-row {
    display:flex; gap:10px; margin-bottom:16px;
  }
  .stat-box {
    flex:1; padding:14px; border-radius:12px; text-align:center;
  }
  .stat-num { font-family:'Outfit',sans-serif; font-size:22px; font-weight:800; }
  .stat-label { font-size:11px; font-weight:600; margin-top:2px; }

  .history-section {
    margin-top:16px;
  }
  .history-row {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; border-radius:8px; background:#fff; border:1px solid #f1f5f9;
    margin-bottom:4px; font-size:13px;
  }
  .history-type { display:inline-flex; align-items:center; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; }
  .type-use { background:#fef2f2; color:#ef4444; }
  .type-buy { background:#ecfdf5; color:#059669; }

  .back-btn {
    display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:8px;
    border:1.5px solid #e2e8f0; background:#fff; font-family:'Noto Sans KR',sans-serif;
    font-size:13px; font-weight:600; color:#64748b; cursor:pointer; margin-bottom:16px;
    transition:all 0.15s;
  }
  .back-btn:active { transform:scale(0.97); }

  .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
  .badge-ok { background:#ecfdf5; color:#059669; }
  .badge-warn { background:#fef3c7; color:#d97706; }
  .badge-empty { background:#fef2f2; color:#ef4444; }

  .progress-bar { height:10px; border-radius:5px; background:#f1f5f9; overflow:hidden; margin:12px auto 0; max-width:200px; }
  .progress-fill { height:100%; border-radius:5px; transition:width 0.4s ease; }

  .empty-state { text-align:center; padding:60px 20px; color:#94a3b8; }

  .config-screen {
    padding:40px 20px; max-width:480px; margin:0 auto; text-align:center;
  }
  .config-screen textarea {
    width:100%; min-height:180px; padding:12px; border-radius:10px; border:1.5px solid #e2e8f0;
    font-family:monospace; font-size:12px; resize:vertical; outline:none;
  }
  .config-screen textarea:focus { border-color:#10b981; }
  .btn-green { padding:12px 24px; border-radius:10px; border:none; background:linear-gradient(135deg,#059669,#10b981); color:#fff; font-family:'Noto Sans KR',sans-serif; font-size:15px; font-weight:700; cursor:pointer; }

  .toast {
    position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:1100;
    padding:12px 24px; border-radius:10px; font-size:14px; font-weight:600;
    box-shadow:0 8px 25px rgba(0,0,0,0.12); animation:slideDown 0.3s ease;
  }
  .toast-success { background:#ecfdf5; color:#059669; border:1px solid #a7f3d0; }
  .toast-error { background:#fef2f2; color:#dc2626; border:1px solid #fecaca; }

  .month-nav {
    display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:12px;
  }
  .month-btn {
    width:36px; height:36px; border-radius:50%; border:1.5px solid #e2e8f0; background:#fff;
    font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all 0.15s;
  }
  .month-btn:active { transform:scale(0.9); }

  @keyframes slideDown { from{transform:translateX(-50%) translateY(-20px);opacity:0;} to{transform:translateX(-50%) translateY(0);opacity:1;} }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .hidden { display:none !important; }
</style>
</head>
<body>

<div id="toast" class="toast hidden"></div>

<!-- Firebase Config Screen -->

<!-- Main App -->
<div id="mainApp" class="hidden">
  <div class="header">
    <div class="header-content">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
        <span style="font-size:28px;">🏊</span>
        <h1>내 수영장 쿠폰</h1>
        <span id="syncBadge" class="sync-badge sync-off"><span class="sync-dot off"></span>연결 중...</span>
      </div>
    </div>
  </div>

  <div style="display:flex;background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:10;">
    <button id="tabBtnCoupon" style="flex:1;padding:12px 0;border:none;border-bottom:3px solid #10b981;background:transparent;color:#10b981;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;" onclick="switchMemberTab('coupon')">내 쿠폰</button>
    <button id="tabBtnNotice" style="flex:1;padding:12px 0;border:none;border-bottom:3px solid transparent;background:transparent;color:#94a3b8;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;cursor:pointer;" onclick="switchMemberTab('notice')">📢 공지사항</button>
  </div>

  <div class="content">
    <div id="mainContent"></div>
    <div id="noticeContent" class="hidden"></div>
  </div>
</div>

<script>
const CONFIG_KEY = "pool-firebase-config-member";
const SELECTED_KEY = "pool-selected-member";
let data = { members:[], history:[] };
let db = null;
let firebaseConnected = false;
let selectedMemberId = localStorage.getItem(SELECTED_KEY) || null;
let viewMonth = (() => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; })();

// ===== FIREBASE =====
function loadConfig() {
  try { return JSON.parse(localStorage.getItem(CONFIG_KEY)); } catch(e){ return null; }
}
function saveConfig() {
  const raw=document.getElementById("configInput").value.trim();
  try {
    const config=JSON.parse(raw);
    if(!config.databaseURL) throw new Error("databaseURL 필수");
    localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
    location.reload();
  } catch(e) { showToast("올바른 JSON 형식이 아닙니다","error"); }
}
function initFirebase(config) {
  try {
    firebase.initializeApp(config);
    db = firebase.database();
    db.ref('.info/connected').on('value', (snap) => {
      firebaseConnected = snap.val() === true;
      updateSyncBadge();
    });
    // Read-only listener
    db.ref('pool').on('value', (snap) => {
      const val = snap.val();
      if(val) {
        data.members = val.members ? Object.values(val.members) : [];
        data.history = val.history ? Object.values(val.history) : [];
        render();
      }
    });
    return true;
  } catch(e) { console.error(e); return false; }
}
function updateSyncBadge() {
  const badge = document.getElementById("syncBadge");
  if(!badge) return;
  if(firebaseConnected) {
    badge.className="sync-badge sync-on";
    badge.innerHTML='<span class="sync-dot on"></span>실시간 연결';
  } else {
    badge.className="sync-badge sync-off";
    badge.innerHTML='<span class="sync-dot off"></span>연결 끊김';
  }
}

let toastTimer;
function showToast(msg,type="success") {
  const el=document.getElementById("toast");
  el.textContent=msg; el.className=`toast toast-${type}`;
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.add("hidden"),2500);
}

function activeMembers() { return data.members.filter(m=>!m.deleted); }

function selectMember(id) {
  selectedMemberId = id;
  localStorage.setItem(SELECTED_KEY, id);
  render();
}
function goBack() {
  selectedMemberId = null;
  localStorage.removeItem(SELECTED_KEY);
  render();
}
function changeMonth(delta) {
  const [y,m] = viewMonth.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  viewMonth = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  render();
}
function resetMemberConfig() {
  if(!confirm("연결 설정을 초기화하시겠습니까?"))return;
  localStorage.removeItem(CONFIG_KEY);
  localStorage.removeItem(SELECTED_KEY);
  location.reload();
}

function getRingColor(m) {
  if(m.remaining===0) return {bg:"#fef2f2",border:"#ef4444",text:"#ef4444"};
  if(m.remaining<=2) return {bg:"#fffbeb",border:"#f59e0b",text:"#d97706"};
  return {bg:"#ecfdf5",border:"#059669",text:"#059669"};
}

let memberTab = "coupon";
function switchMemberTab(tab) {
  memberTab = tab;
  const btnC = document.getElementById("tabBtnCoupon");
  const btnN = document.getElementById("tabBtnNotice");
  const mainC = document.getElementById("mainContent");
  const noticeC = document.getElementById("noticeContent");
  if(tab==="coupon") {
    btnC.style.borderBottomColor="#10b981"; btnC.style.color="#10b981"; btnC.style.fontWeight="700";
    btnN.style.borderBottomColor="transparent"; btnN.style.color="#94a3b8"; btnN.style.fontWeight="500";
    mainC.classList.remove("hidden"); noticeC.classList.add("hidden");
  } else {
    btnN.style.borderBottomColor="#10b981"; btnN.style.color="#10b981"; btnN.style.fontWeight="700";
    btnC.style.borderBottomColor="transparent"; btnC.style.color="#94a3b8"; btnC.style.fontWeight="500";
    mainC.classList.add("hidden"); noticeC.classList.remove("hidden");
    renderMemberNotice();
  }
}

function renderMemberNotice() {
  const el = document.getElementById("noticeContent");
  if(!el) return;
  el.innerHTML=`
    <div style="margin-bottom:20px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
        <span style="font-size:22px;">📢</span>
        <span style="font-size:17px;font-weight:800;color:#0f172a;">수중하키 정기세션 티켓 안내</span>
      </div>
      <p style="font-size:12px;color:#94a3b8;">2025년 3월 시행 · 화성 에스앤제이프리미엄 수영장</p>
    </div>

    <div style="padding:16px;border-radius:14px;background:#fff;border:2px solid #10b981;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.03);">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
        <span style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#059669,#10b981);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800;">₩</span>
        <span style="font-size:15px;font-weight:800;color:#0f172a;">티켓 가격 안내</span>
      </div>

      <div style="background:#f0fdfa;border-radius:10px;padding:14px;margin-bottom:12px;">
        <p style="font-size:12px;font-weight:700;color:#0f766e;margin-bottom:10px;">📦 수량별 티켓 단가</p>
        <div style="display:flex;flex-direction:column;gap:6px;">
          ${[['40매','16,000원/매','#059669'],['30~39매','18,000원/매','#0891b2'],['20~29매','20,000원/매','#0891b2'],['10~19매','22,000원/매','#d97706'],['5~9매','24,000원/매','#d97706']].map(([q,p,c])=>`
          <div style="display:flex;justify-content:space-between;padding:8px 12px;border-radius:8px;background:#fff;border:1px solid #ccfbf1;">
            <span style="font-size:13px;color:#334155;font-weight:600;">${q}</span>
            <span style="font-size:14px;font-weight:800;color:${c};">${p}</span>
          </div>`).join('')}
        </div>
      </div>

      <div style="background:#fef2f2;border-radius:10px;padding:14px;">
        <p style="font-size:12px;font-weight:700;color:#991b1b;margin-bottom:8px;">🎟️ 티켓 미보유 시</p>
        <div style="display:flex;justify-content:space-between;padding:8px 12px;border-radius:8px;background:#fff;border:1px solid #fecaca;margin-bottom:4px;">
          <span style="font-size:13px;color:#334155;font-weight:600;">1회 참여비</span>
          <span style="font-size:14px;font-weight:800;color:#ef4444;">25,000원 (현금)</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:8px 12px;border-radius:8px;background:#fff;border:1px solid #fecaca;">
          <span style="font-size:13px;color:#334155;font-weight:600;">첫 참여 1회</span>
          <span style="font-size:14px;font-weight:800;color:#d97706;">20,000원 (현금)</span>
        </div>
      </div>

      <div style="margin-top:12px;padding:10px 12px;border-radius:8px;background:#eff6ff;border:1px solid #bfdbfe;">
        <p style="font-size:12px;color:#1e40af;font-weight:600;">💰 입금 안내</p>
        <p style="font-size:13px;color:#1e3a5f;font-weight:700;margin-top:4px;">카카오뱅크 3333-31-7659013 (꼴뚜기)</p>
        <p style="font-size:11px;color:#64748b;margin-top:2px;">선입금 · 현금만 가능</p>
      </div>
    </div>

    <div style="padding:16px;border-radius:14px;background:#fff;border:1.5px solid #e2e8f0;margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
        <span style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;">📋</span>
        <span style="font-size:15px;font-weight:800;color:#0f172a;">이용 안내</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;font-size:13px;color:#334155;line-height:1.7;">
        <div style="display:flex;gap:8px;"><span style="color:#059669;font-weight:800;flex-shrink:0;">사용처</span><span>화성 에스앤제이프리미엄 수영장 정기세션에서만 사용 가능 (비정기·타 수영장 불가)</span></div>
        <div style="display:flex;gap:8px;"><span style="color:#059669;font-weight:800;flex-shrink:0;">세션일</span><span>매주 토요일 또는 일요일 (수영장 일정 및 클럽 정책에 따라 운영)</span></div>
        <div style="display:flex;gap:8px;"><span style="color:#059669;font-weight:800;flex-shrink:0;">사용법</span><span>티켓 1매 = 세션 1회. 실물 티켓 없이 대장으로 관리, 참여 시 보유 수량에서 차감</span></div>
        <div style="height:1px;background:#e2e8f0;margin:4px 0;"></div>
        <div style="display:flex;gap:8px;"><span style="color:#6366f1;font-weight:800;flex-shrink:0;">구매</span><span>연중 수시 구매 가능 · 최소 5매 이상 · 인당 최대 40매</span></div>
        <div style="display:flex;gap:8px;"><span style="color:#6366f1;font-weight:800;flex-shrink:0;">기한</span><span>2027년 2월 말까지 (약 40회 세션 예정)</span></div>
        <div style="display:flex;gap:8px;"><span style="color:#6366f1;font-weight:800;flex-shrink:0;">양도</span><span>타인에게 양도 가능 · 단, 환불은 불가</span></div>
      </div>
    </div>

    <div style="padding:16px;border-radius:14px;background:linear-gradient(135deg,#f8fafc,#f0fdf4);border:1.5px dashed #cbd5e1;text-align:center;">
      <p style="font-size:13px;color:#64748b;line-height:1.8;">
        🏊 우리 클럽은 회비가 없습니다.<br>
        모든 활동은 참여자의 자발적인 자원봉사 및 기부로 유지되며<br>
        티켓 판매 수익은 <strong style="color:#0f172a;">대관료 및 공용비품 구매</strong>에 사용됩니다.
      </p>
    </div>
  `;
}

function render() {
  const el = document.getElementById("mainContent");
  if(!el) return;
  const members = activeMembers();

  // If member selected and exists, show detail
  const selected = selectedMemberId ? members.find(m=>m.id===selectedMemberId) : null;

  if(selected) {
    renderDetail(el, selected);
  } else {
    renderList(el, members);
  }
}

function renderList(el, members) {
  let html = `
    <div style="margin-bottom:16px;">
      <p style="font-size:15px;font-weight:700;color:#0f172a;margin-bottom:4px;">내 이름을 선택하세요</p>
      <p style="font-size:12px;color:#94a3b8;">실시간으로 쿠폰 잔여와 이용 내역을 확인할 수 있습니다</p>
    </div>`;

  if(members.length===0) {
    html+=`<div class="empty-state"><div style="font-size:48px;margin-bottom:12px;">⏳</div><p style="font-size:15px;font-weight:600;">등록된 회원이 없습니다</p><p style="font-size:13px;margin-top:6px;">관리자에게 등록을 요청하세요</p></div>`;
  } else {
    html+=members.map(m=>{
      const ring=getRingColor(m);
      const statusBadge=m.remaining===0?`<span class="badge badge-empty">소진</span>`:m.remaining<=2?`<span class="badge badge-warn">⚠️ ${m.remaining}장</span>`:`<span class="badge badge-ok">${m.remaining}장</span>`;
      return `
        <div class="member-list-item" onclick="selectMember('${m.id}')">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:12px;">
              <div style="width:42px;height:42px;border-radius:50%;background:${ring.bg};border:2.5px solid ${ring.border};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <span style="font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;color:${ring.text};">${m.remaining}</span>
              </div>
              <div>
                <div style="font-weight:700;font-size:15px;color:#0f172a;">${m.name}</div>
                ${m.affiliation?`<div style="font-size:11px;color:#94a3b8;">${m.affiliation}</div>`:''}
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              ${statusBadge}
              <span style="color:#cbd5e1;font-size:18px;">›</span>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  el.innerHTML=html;
}

function renderDetail(el, m) {
  const ring = getRingColor(m);
  const pct = m.totalBought>0?(m.remaining/m.totalBought*100):0;
  const totalUsed = m.totalBought - m.remaining;
  const myHistory = data.history.filter(h=>h.memberId===m.id);
  const monthHistory = myHistory.filter(h=>h.date.startsWith(viewMonth)).sort((a,b)=>(b.timestamp||'').localeCompare(a.timestamp||''));
  const monthUses = monthHistory.filter(h=>h.type==="use").length;

  let html = `
    <button class="back-btn" onclick="goBack()">← 목록으로</button>

    <div class="profile-card">
      <div class="big-ring" style="background:${ring.bg};border:4px solid ${ring.border};">
        <div class="big-ring-num" style="color:${ring.text};">${m.remaining}</div>
        <div class="big-ring-label" style="color:${ring.text};">잔여</div>
      </div>
      <div style="font-weight:800;font-size:20px;color:#0f172a;margin-bottom:4px;">${m.name}</div>
      ${m.affiliation?`<div style="font-size:13px;color:#94a3b8;margin-bottom:8px;">${m.affiliation}</div>`:''}
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,${ring.border},${ring.border}88);"></div>
      </div>
      <div style="font-size:12px;color:#94a3b8;margin-top:8px;">총 ${m.totalBought}장 중 ${totalUsed}장 사용</div>
    </div>

    <div class="stats-row">
      <div class="stat-box" style="background:#ecfdf5;border:1px solid #a7f3d0;">
        <div class="stat-num" style="color:#059669;">${m.remaining}</div>
        <div class="stat-label" style="color:#059669;">잔여 쿠폰</div>
      </div>
      <div class="stat-box" style="background:#fef2f2;border:1px solid #fecaca;">
        <div class="stat-num" style="color:#ef4444;">${totalUsed}</div>
        <div class="stat-label" style="color:#ef4444;">총 사용</div>
      </div>
      <div class="stat-box" style="background:#eff6ff;border:1px solid #bfdbfe;">
        <div class="stat-num" style="color:#2563eb;">${monthUses}</div>
        <div class="stat-label" style="color:#2563eb;">이번 달 사용</div>
      </div>
    </div>

    <div class="history-section">
      <div class="month-nav">
        <button class="month-btn" onclick="changeMonth(-1)">‹</button>
        <span style="font-weight:700;font-size:15px;color:#0f172a;min-width:100px;text-align:center;">${viewMonth}</span>
        <button class="month-btn" onclick="changeMonth(1)">›</button>
      </div>`;

  if(monthHistory.length===0) {
    html+=`<div style="text-align:center;padding:30px;color:#94a3b8;font-size:13px;">이 달의 내역이 없습니다</div>`;
  } else {
    html+=monthHistory.map(r=>{
      const isUse=r.type==="use";
      const companionInfo = r.companions&&r.companions.length ? `<div style="font-size:11px;color:#6366f1;padding-top:2px;">+동반: ${r.companions.join(', ')}</div>` : '';
      return `
        <div class="history-row" style="flex-direction:column;align-items:stretch;gap:3px;">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="history-type ${isUse?'type-use':'type-buy'}">${isUse?'사용':'구매'}</span>
              <span style="color:#64748b;font-size:12px;">${isUse?`-${r.amount||1}장`:`+${r.amount}장`}</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;color:#94a3b8;font-size:11px;">
              <span>${r.date}</span><span>${r.time}</span>
              ${r.remaining!=null&&isUse?`<span style="color:#64748b;">잔여${r.remaining}</span>`:''}
            </div>
          </div>
          ${companionInfo}
        </div>`;
    }).join('');
  }

  html+=`</div>`;
  el.innerHTML=html;
}
